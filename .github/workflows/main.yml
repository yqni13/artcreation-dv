# GitHub Action name
name: Jest automatic testing

# event trigger
on: 
  pull_request:
    branches: 
    - development
    - staging
    - production

jobs:
  # ID of job
  run-jest-tests:
    # job name
    name: Run Jest tests
    runs-on: ubuntu-latest
    env:
      MODE: staging
      SECRET_EMAIL_RECEIVER: ${{ secrets.SECRET_EMAIL_RECEIVER}}
      SECRET_EMAIL_SENDER: ${{ secrets.SECRET_EMAIL_SENDER}}
      SECRET_EMAIL_PASS: ${{ secrets.SECRET_EMAIL_PASS}}
      SECRET_IV_POS: ${{ secrets.SECRET_IV_POS}}
      SECRET_AES_PASSPHRASE: ${{ secrets.SECRET_AES_PASSPHRASE}}
      SECRET_CORS_ORIGIN: ${{ secrets.SECRET_CORS_ORIGIN}}
      SECRET_ADMIN_ID: ${{ secrets.SECRET_ADMIN_ID}}
      SECRET_ADMIN_USER: ${{ secrets.SECRET_ADMIN_USER}}
      SECRET_ADMIN_PASS: ${{ secrets.SECRET_ADMIN_PASS}}
      SECRET_CRYPTO_KEY: ${{ secrets.SECRET_CRYPTO_KEY}}
      SECRET_DB_USER_NEON: ${{ secrets.SECRET_DB_USER_NEON}}
      SECRET_DB_PASS_NEON: ${{ secrets.SECRET_DB_PASS_NEON}}
      SECRET_DB_HOST_NEON: ${{ secrets.SECRET_DB_HOST_NEON}}
      SECRET_DB_DB_NEON: ${{ secrets.SECRET_DB_DB_NEON}}
      SECRET_DB_USER_LOCAL: ${{ secrets.SECRET_DB_USER_LOCAL}}
      SECRET_DB_PASS_LOCAL: ${{ secrets.SECRET_DB_PASS_LOCAL}}
      SECRET_DB_DB_LOCAL: ${{ secrets.SECRET_DB_DB_LOCAL}}
      SECRET_DB_HOST_LOCAL: ${{ secrets.SECRET_DB_HOST_LOCAL}}
      SECRET_DB_PORT_LOCAL: ${{ secrets.SECRET_DB_PORT_LOCAL}}
      SECRET_PUBLIC_KEY: ${{ secrets.SECRET_PUBLIC_KEY}}
      SECRET_PRIVATE_KEY: ${{ secrets.SECRET_PRIVATE_KEY}}
      SECRET_CLOUDSTORAGE_BUCKET: ${{ secrets.SECRET_CLOUDSTORAGE_BUCKET}}
      SECRET_CLOUDSTORAGE_ENDPOINT: ${{ secrets.SECRET_CLOUDSTORAGE_ENDPOINT}}
      SECRET_CLOUDSTORAGE_PUBLIC_URL: ${{ secrets.SECRET_CLOUDSTORAGE_PUBLIC_URL}}
      SECRET_CLOUDSTORAGE_ACCESS_KEY_ID: ${{ secrets.SECRET_CLOUDSTORAGE_ACCESS_KEY_ID}}
      SECRET_CLOUDSTORAGE_SECRET_KEY: ${{ secrets.SECRET_CLOUDSTORAGE_SECRET_KEY}}
      SECRET_BETTERSTACK_LOGGING_KEY: ${{ secrets.SECRET_BETTERSTACK_LOGGING_KEY}}
      SECRET_BETTERSTACK_HOST: ${{ secrets.SECRET_BETTERSTACK_HOST}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Run Jest tests
        run: npm run test
        working-directory: ./backend
          
          

<!-- Original design inspired by: https://codepen.io/andreacrawford/pen/NvqJXW -->
<div id="artdv-starrating">
    <div class="artdv-starrating-wrapper">
        <input disabled checked class="rating__input rating__input--none" name="rating" id="rating-none" value="0" type="radio">
        <label class="rating__label" for="star1">
            <i
                class="icon-star rating__icon rating__icon--star"
                [ngClass]="hasNewRating ? 'star-active' : 'star-passive'"
            ></i>
        </label>
        <input
            class="rating__input"
            name="rating"
            id="star1"
            [value]="1"
            type="radio"
            [checked]="startValueSignal() === 1"
            (change)="onChange($event)"
            #star1Ref
        >
        <label class="rating__label" for="star2">
            <i
                class="icon-star rating__icon rating__icon--star"
                [ngClass]="hasNewRating ? 'star-active' : 'star-passive'"
            ></i>
        </label>
        <input
            class="rating__input"
            name="rating"
            id="star2"
            [value]="2"
            type="radio"
            [checked]="startValueSignal() === 2"
            (change)="onChange($event)"
            #star2Ref
        >
        <label class="rating__label" for="star3">
            <i
                class="icon-star rating__icon rating__icon--star"
                [ngClass]="hasNewRating ? 'star-active' : 'star-passive'"
            ></i>
        </label>
        <input
            class="rating__input"
            name="rating"
            id="star3"
            [value]="3"
            type="radio"
            [checked]="startValueSignal() === 3"
            (change)="onChange($event)"
            #star3Ref
        >
        <label class="rating__label" for="star4">
            <i
                class="icon-star rating__icon rating__icon--star"
                [ngClass]="hasNewRating ? 'star-active' : 'star-passive'"
            ></i>
        </label>
        <input
            class="rating__input"
            name="rating"
            id="star4"
            [value]="4"
            type="radio"
            [checked]="startValueSignal() === 4"
            (change)="onChange($event)"
            #star4Ref
        >
        <label class="rating__label" for="star5">
            <i
                class="icon-star rating__icon rating__icon--star"
                [ngClass]="hasNewRating ? 'star-active' : 'star-passive'"
            ></i>
        </label>
        <input
            class="rating__input"
            name="rating"
            id="star5"
            [value]="5"
            type="radio"
            [checked]="startValueSignal() === 5"
            (change)="onChange($event)"
            #star5Ref
        >
    </div>
    <div id="artdv-rating-value-wrapper">
        <span id="artdv-rating-value">{{rawRating}}</span>
        <span id="artdv-rating-text">{{'common.component.star-rating.select' | translate}}</span>
    </div>
</div>

<div class="artdv-select-wrapper {{className()}}" ngClass="{{ngClass()}}">
	<select
		[formControl]="formControl()"
		(change)="selectOption($event)"
		#isAutoFocus
	>
		<option value="" disabled>{{placeholder()}}</option>
		<hr>
		@for (option of options() ?? {} | keyvalue; track $index) {
			<option value="{{option.value}}">
				{{optionsTranslateRoot() + (option.key) | translate}}
			</option>
		}
	</select>
	<artdv-validation
		[ngControl]="formControl()"
		[fieldName]="fieldName()"
	></artdv-validation>
</div>
